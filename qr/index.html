<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Le Refuge de Saintines</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css"> <!-- Ton CSS global -->

</head>

<body>
    <div id="blocked" class="blocked">
        🚫 Accès refusé. Veuillez utiliser le QR code pour accéder à cette page.
    </div>

    <div id="content" style="display:none;">
    <!-- HEADER -->
    <header class="site-header qr-code">
      <div class="container header-inner">
        <a href="#" class="brand">
          <img src="../images/lrds-logo.png" alt="Logo Le Refuge de Saintines" class="brand-logo" loading="lazy">
            <div class="brand-text">
                <span class="logo">Le Refuge</span>
                <span class="sub">de Saintines</span>
            </div>
        </a>
      </div>
    </header>

    <main id="main">
    <!-- HERO -->
    <section class="hero">
      <img src="../images/hero.webp" alt="Le Refuge de Saintines" class="hero-img" loading="eager" fetchpriority="high">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Bienvenue sur l'Intranet</h1>
        <p>du Refuge de Saintines</p>
      </div>
    </section>

    <!-- SECTION -->
    <section id="nav-qr" class="section">
        <div class="container">
            <h2>Choix de la catégorie</h2>
        </div>

    </section>
</main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; <strong>Le Refuge de Saintines - 2025 All rights reserved.</strong>
        </div>
    </footer>

    <!-- Script JS Global-->
    <script src="../script.js" defer></script>
</body>
</html>
